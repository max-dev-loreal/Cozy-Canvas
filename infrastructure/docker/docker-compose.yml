services:
  postgres:
    image: postgres:15-alpine
    container_name: cozy-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-cozy_canvas}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../migrations:/migrations:ro
    # Healthcheck to verify postgres is ready before dependent services start
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${DB_USER:-postgres} -d $${DB_NAME:-cozy_canvas}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2024-05-10T01-39-38Z
    container_name: cozy-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-cozyadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-cozysecret}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
